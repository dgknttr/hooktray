name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semantic image tag to deploy, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/dgknttr/hooktray-backend
  NGINX_IMAGE: ghcr.io/dgknttr/hooktray-nginx

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            image_tag="${{ github.event.release.tag_name }}"
          else
            image_tag="${{ inputs.version }}"
          fi

          if [[ ! "${image_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: ${image_tag}" >&2
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push nginx frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.NGINX_IMAGE }}:latest
          build-args: NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      APP_DIR: ${{ vars.APP_DIR }}
    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'mkdir -p ${{ env.APP_DIR }}'
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.APP_DIR }}/docker-compose.yml"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'ENDSSH'
            set -euo pipefail
            cd '${{ env.APP_DIR }}'
            printf 'DOMAIN=%s\nHOOKTRAY_IMAGE_TAG=%s\n' \
              '${{ vars.DOMAIN }}' \
              '${{ needs.build.outputs.image_tag }}' > .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          ENDSSH
