name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hooktray-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hooktray-backend:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hooktray-backend:cache,mode=max

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hooktray-nginx:latest
          build-args: NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hooktray-nginx:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hooktray-nginx:cache,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/hooktray
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
