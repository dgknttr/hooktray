name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/dgknttr/hooktray-backend
  NGINX_IMAGE: ghcr.io/dgknttr/hooktray-nginx
  APP_DIR: /srv/apps/hooktray

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push nginx frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:${{ github.sha }}
            ${{ env.NGINX_IMAGE }}:latest

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'mkdir -p ${{ env.APP_DIR }}'
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.APP_DIR }}/docker-compose.yml"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'ENDSSH'
            set -euo pipefail
            cd '${{ env.APP_DIR }}'
            printf 'DOMAIN=%s\nHOOKTRAY_IMAGE_TAG=%s\n' \
              '${{ vars.DOMAIN }}' \
              '${{ needs.build.outputs.image_tag }}' > .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          ENDSSH
