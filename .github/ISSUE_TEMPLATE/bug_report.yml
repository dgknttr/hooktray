name: Bug report
description: Report a reproducible HookTray bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include real webhook secrets, raw production payloads, or sensitive credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproduction you can.
      placeholder: |
        1. Start backend...
        2. Start frontend...
        3. Send request...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - SSE/live stream
        - IndexedDB/local history
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 124, Firefox 125, Safari 17, etc.
  - type: input
    id: dotnet
    attributes:
      label: .NET SDK version
      placeholder: Output of dotnet --version
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: Output of node --version
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, raw tokens, payloads, header values, and personal data before sharing.
      render: shell
