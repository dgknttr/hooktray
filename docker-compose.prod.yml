services:
  backend:
    image: ghcr.io/dgknttr/hooktray-backend:${HOOKTRAY_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Cors__AllowedOrigins__0: https://${DOMAIN}
    networks:
      - internal

  nginx:
    image: ghcr.io/dgknttr/hooktray-nginx:${HOOKTRAY_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
